<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Dashboard</title>
    <link rel="shortcut icon" href="img/icons/logo.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-div-1">
        <h1>
          Inventory Deshboard <img class="logo" src="./img/logo.png" alt="" />
        </h1>
        <h3>Total de Itens Cadastrados: <span>1280</span></h3>
      </div>

      <div class="header-div-2">
        <h3>Olá, Admin!</h3>
        <img src="./img/usuario.png" alt="" />
      </div>
    </header>
    <main>
      <div class="cadastrar-produtos">
        <div class="cadastrar-produtos-titulo">Cadastrar Produto</div>
        <div>
          <input
            type="text"
            placeholder="Nome do Produto"
            name="NomePro"
            id="nomePro"
          />
          <input
            type="number"
            placeholder="Valor do Produto"
            name="ValorPro"
            id="valorPro"
          />
          <input
            type="number"
            placeholder="Quantidade"
            name="ValorPro"
            id="quantidadePro"
          />
          <input
            type="text"
            name="Categoria"
            id="categoriaPro"
            placeholder="Categoria"
          />
          <input class="botao-adicionar" type="button" value="Adicionar" onclick="produtos.Adicionar()" />
        </div>
      </div>
      <div class="filtros">
        <div class="busca-div">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            strokeWidth="{1.5}"
            stroke="currentColor"
            className="size-6"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
            />
          </svg>
          <input class="campo-busca" type="text" name="" id="buscaPro" onkeydown="produtos.BuscaProduto()" />
        </div>
        <div class="botoes-categorias">
          <div class="borda-direita-2-div">
            <button type="button" value="Todos">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                strokeWidth="{1.5}"
                stroke="currentColor"
                className="size-6"
              >
                <path
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 0 1 0 3.75H5.625a1.875 1.875 0 0 1 0-3.75Z"
                />
              </svg>
              <p>Todos</p>
            </button>
          </div>
          <div>
            <button type="button" value="Todos">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                strokeWidth="{1.5}"
                stroke="currentColor"
                className="size-6"
              >
                <path
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25"
                />
              </svg>
              <p>Eletronicos</p>
            </button>
          </div>
          <div>
            <button type="button" value="Todos">
              <img src="./img/e.svg" alt="" />
              <p>Moda</p>
            </button>
          </div>
          <div class="borda-esquerda-2-div">
            <button type="button" value="Todos">
              <img src="./img/ee.svg" alt="" />
              <p>Casa</p>
            </button>
          </div>
        </div>
      </div>
      <div class="resultado">
       <div class="vazio">
            <img class="caixa-vazia" src="./img/caixa.png" alt="" />
            <h3>Nenhum Produto Encontrado</h3>
          </div>
        <div id="produtos-lista" class="produtos">
          
        </div>
      </div>
      </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
